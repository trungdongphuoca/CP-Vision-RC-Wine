<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sommelier - Generative Wine Recommendation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c2185b;
            --primary-hover: #e91e63;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: rgba(194, 24, 91, 0.3);
            --ai-msg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #31081f 0%, var(--bg-color) 60%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header {
            width: 100%;
            padding: 1rem;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--surface-border);
            z-index: 20;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #ff7eb3, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-container {
            flex: 1;
            width: 100%;
            max-width: 900px;
            overflow-y: auto;
            padding: 2rem;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for neatness */
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 1.5rem;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 1.1rem;
            animation: fadeIn 0.3s ease-out;
        }

        .user-message {
            background: var(--user-msg);
            border: 1px solid rgba(194, 24, 91, 0.5);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            background: var(--ai-msg);
            border: 1px solid var(--surface-border);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(12px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wine-card {
            background: rgba(0, 0, 0, 0.2);
            border-left: 4px solid var(--primary);
            padding: 1.5rem;
            margin-top: 1rem;
            border-radius: 12px;
        }

        .wine-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin: 0 0 0.5rem 0;
            color: #fff;
        }

        .wine-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .tag {
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ff7eb3;
            font-weight: 600;
        }

        .wine-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 0.5rem;
        }

        .meta-id {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 1rem;
            font-family: monospace;
        }

        .input-area {
            width: 100%;
            max-width: 900px;
            padding: 1.5rem;
            box-sizing: border-box;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--surface-border);
        }

        .search-container {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 1.2rem 1.5rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(194, 24, 91, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--primary) 0%, #ff758c 100%);
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(194, 24, 91, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(194, 24, 91, 0.4);
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 5px;
            padding: 1rem;
            background: transparent;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
        .blob-1 { width: 400px; height: 400px; background: #c2185b; top: -100px; left: -100px; border-radius: 50%; }
        .blob-2 { width: 300px; height: 300px; background: #4f46e5; bottom: -50px; right: -50px; border-radius: 50%; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="header">
        <h1>AI Sommelier</h1>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Hello! I am your AI Sommelier. Tell me what you're craving, what you're eating, or what occasion you're celebrating, and I will find the perfect bottle of wine for you.
        </div>
    </div>

    <div class="input-area">
        <div class="search-container">
            <input type="text" id="queryInput" placeholder="e.g., A bold red wine for pizza night, around $40" autocomplete="off" onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Store conversation history
        let chatHistory = [];

        async function sendMessage() {
            const input = document.getElementById('queryInput');
            const query = input.value.trim();
            if (!query) return;

            // Add user message to UI
            appendMessage(query, 'user');
            input.value = '';
            input.disabled = true;
            document.getElementById('sendBtn').disabled = true;

            // Show typing indicator
            const typingId = showTyping();

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query: query,
                        history: chatHistory 
                    })
                });

                document.getElementById(typingId).remove();

                if (!response.ok) throw new Error('API request failed');

                const data = await response.json();
                
                // Add Assistant response to UI
                appendMessage(data, 'ai');

                // Save to history (only the text content, not the full card)
                chatHistory.push({ role: 'user', content: query });
                chatHistory.push({ role: 'assistant', content: data.message });

            } catch (error) {
                document.getElementById(typingId).remove();
                appendMessage("Sorry, I encountered an error. Is the server running?", 'ai', true);
            }

            input.disabled = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function appendMessage(data, sender, isError = false) {
            const container = document.getElementById('chatContainer');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;

            if (sender === 'user') {
                msgDiv.textContent = data;
            } else if (isError) {
                msgDiv.textContent = data;
                msgDiv.style.color = '#ef4444';
            } else {
                if (data.type === 'chat') {
                    msgDiv.textContent = data.message;
                } else if (data.type === 'recommendation') {
                    // Formatting AI response with wine card
                    const priceStr = data.retrieved_wine.price ? `$${data.retrieved_wine.price}` : 'Price N/A';
                    
                    msgDiv.innerHTML = `
                        <div>${data.message}</div>
                        <div class="wine-card">
                            <h3 class="wine-title">${data.retrieved_wine.title}</h3>
                            <div class="wine-tags">
                                <span class="tag">${data.retrieved_wine.variety}</span>
                                <span class="tag">${data.retrieved_wine.country}</span>
                            </div>
                            <div class="wine-price">${priceStr}</div>
                            <div style="font-size: 0.95rem; color: #cbd5e1;">${data.retrieved_wine.description}</div>
                            <div class="meta-id">Target Semantic ID: ${data.generated_profile_thought}</div>
                        </div>
                    `;
                } else {
                    msgDiv.textContent = data.message || "Unknown response format";
                }
            }

            container.appendChild(msgDiv);
            scrollToBottom();
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const id = 'typing-' + Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.id = id;
            msgDiv.className = `message ai-message typing`;
            msgDiv.innerHTML = `<span></span><span></span><span></span>`;
            container.appendChild(msgDiv);
            scrollToBottom();
            return id;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
